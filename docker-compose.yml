x-strava-service: &strava-service
    build: .
    image: strava-noshoes:local
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

services:
  strava-noshoes:
    <<: *strava-service
    container_name: strava-noshoes-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  # Optional second instance with independent Strava/Telegram credentials.
  # Start it with:
  # docker compose --profile secondary up -d --build strava-noshoes-secondary
  strava-noshoes-secondary:
    <<: *strava-service
    profiles: ["secondary"]
    container_name: strava-noshoes-app-secondary
    ports:
      - "8001:8000"
    env_file:
      - .env.secondary
    volumes:
      - ./data-secondary:/app/data
      - ./logs-secondary:/app/logs

  # Optional: Add a reverse proxy (uncomment if needed)
  # nginx:
  #   image: nginx:alpine
  #   container_name: strava-noshoes-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - strava-noshoes
  #   restart: unless-stopped

networks:
  default:
    name: strava-noshoes-network
